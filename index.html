<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Followers Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">

        <div class="logo">FindOutgram</div>

        <!-- <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#">How To Use</a>
            <a href="#">About</a>
        </div> -->

    </nav>

    <section class="hero">

        <div class="hero-content">

            <div class="hero-text">

                <h1>
                    Check Instagram <span>Followers</span> and Following Easily.
                </h1>

                <p>
                    Upload your Instagram data and see who acts like a celebrity and doesn’t follow you back,
                    bro thinks he’s Cristiano Ronaldo.
                </p>

                <div class="hero-buttons">
                    <a href="#" class="btn btn-primary" id="clickme-btn">Click Me!</a>
                    <a href="#" class="btn btn-secondary">Learn How to Upload</a>
                </div>

            </div>

            <div class="upload-card">

                <div class="upload-area">

                    <label for="json-upload" class="upload-box">

                        <div class="upload-icon"><img src="folder.png" width="100" alt="folder"></div>

                        <h4>Upload Instagram Data</h4>

                        <p>
                            Select all JSON files from your Instagram data
                        </p>

                        <span class="upload-info">
                            followers_1.json • following.json • following_hashtags.json
                        </span>

                    </label>

                    <input type="file" id="json-upload" multiple accept=".json">

                    <div class="selected-files" id="selected-files">
                        No files selected
                    </div>

                    <button class="upload-btn">
                        Upload
                    </button>

                </div>

            </div>

        </div>

    </section>

    <section class="info-section">

        <div class="info-wrapper">

        </div>

    </section>

    <footer>
        © 2026 - Ibul dan Ardi
    </footer>
    <script src="script.js"></script>

</body>

</html>
